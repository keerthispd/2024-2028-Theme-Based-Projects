<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Settings - CryptoSafe</title>
  <style>
    body{font-family:Segoe UI,Arial,sans-serif;background:#07111d;color:#e8f1f8;padding:24px}
    .card{max-width:820px;margin:0 auto;background:rgba(11,20,34,0.86);padding:20px;border-radius:14px;border:1px solid rgba(110,231,183,0.06)}
    h1{margin:0 0 8px}
    .row{display:flex;gap:12px;align-items:center;margin:12px 0}
    button{padding:10px 14px;border-radius:10px;border:0;background:linear-gradient(135deg,#6ee7b7,#38bdf8);color:#02131f;font-weight:700}
    input[type=password]{padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:inherit}
    .muted{color:#9cb6c7;font-size:0.92rem}
    .danger{background:linear-gradient(135deg,#fda4af,#fb7185);color:#2b0210}
    .status{margin-top:8px}
  </style>
</head>
<body>
  <main class="card">
    <h1>Account Settings</h1>
    <p class="muted">Manage device passkeys and numeric passcode used for cross-device recovery.</p>

    <section id="webauthnSection">
      <h2 style="font-size:1.05rem;margin-top:12px">Passkeys (WebAuthn)</h2>
      <div class="row">
        <button id="registerPasskeyBtn">Register passkey</button>
        <button id="removePasskeyBtn" class="danger">Remove passkey</button>
      </div>
      <div id="webauthnMsg" class="status muted"></div>
    </section>

    <section id="passcodeSection">
      <h2 style="font-size:1.05rem;margin-top:18px">Passcode</h2>
      <div class="row">
        <input id="passcodeInput" type="password" placeholder="New numeric passcode (4+ digits)" />
        <button id="setPasscodeBtn">Set passcode</button>
        <button id="removePasscodeBtn" class="danger">Remove passcode</button>
      </div>
      <div id="passcodeMsg" class="status muted"></div>
    </section>

    <div style="margin-top:18px"><a href="/dashboard.html">Back to dashboard</a></div>
  </main>

  <script>
    function show(el,msg){ el.textContent=msg; }

    async function postJson(url,data){ const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data||{})}); const t=await r.text(); try{return JSON.parse(t);}catch(e){return {error:t||'Invalid response'}} }

    function ensureWebAuthnHost(){ const host=window.location.hostname; if(host==='127.0.0.1' || host==='0.0.0.0' || host==='::1'){ const normalized=`${window.location.protocol}//localhost${window.location.port?`:${window.location.port}`:''}${window.location.pathname}${window.location.search}${window.location.hash}`; window.location.replace(normalized); return false; } return true; }

    document.getElementById('registerPasskeyBtn').addEventListener('click', async function(){
      const msg = document.getElementById('webauthnMsg'); show(msg,'Preparing...');
      if(!ensureWebAuthnHost()){ show(msg,'Redirecting to localhost for biometric compatibility...'); return; }
      if(!window.navigator.credentials || !navigator.credentials.create){ show(msg,'WebAuthn not available in this browser.'); return; }
      const opts = await postJson('/api/account/webauthn/register/options');
      if(opts.error){ show(msg,opts.error||'Failed to get options'); return; }
      // normalize binary fields
      function b64uToBuf(s){ if(s instanceof ArrayBuffer){ return new Uint8Array(s); } if(ArrayBuffer.isView(s)){ return new Uint8Array(s.buffer, s.byteOffset, s.byteLength); } if(typeof s!=='string'){ throw new Error('Invalid binary input format.'); } const base64=s.replace(/-/g,'+').replace(/_/g,'/'); const pad='='.repeat((4-(base64.length%4))%4); const bin=atob(base64+pad); const a=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i); return a; }
      opts.challenge = b64uToBuf(opts.challenge);
      opts.user.id = b64uToBuf(opts.user.id);
      if(Array.isArray(opts.excludeCredentials)) opts.excludeCredentials = opts.excludeCredentials.map(c=>({ ...c, id: b64uToBuf(c.id) }));
      try{
        const cred = await navigator.credentials.create({ publicKey: opts });
        if(!cred) throw new Error('Credential creation cancelled');
        const toB64=(arr)=>btoa(String.fromCharCode(...new Uint8Array(arr))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
        const payload = { credential: { id: cred.id, rawId: toB64(cred.rawId), type: cred.type, response: { attestationObject: toB64(cred.response.attestationObject), clientDataJSON: toB64(cred.response.clientDataJSON) } } };
        const verify = await postJson('/api/account/webauthn/register/verify', payload);
        if(verify.error) throw new Error(verify.error||'Verify failed');
        show(msg, verify.message || 'Registered');
      }catch(e){ show(msg, e.message || String(e)); }
    });

    document.getElementById('removePasskeyBtn').addEventListener('click', async function(){ const msg=document.getElementById('webauthnMsg'); show(msg,'Removing...'); const r=await postJson('/api/account/remove_webauthn'); show(msg, r.error || r.message || 'Removed'); });

    document.getElementById('setPasscodeBtn').addEventListener('click', async function(){ const p=document.getElementById('passcodeInput').value.trim(); const msg=document.getElementById('passcodeMsg'); if(p.length<4){ show(msg,'Passcode too short'); return;} show(msg,'Setting...'); const r=await postJson('/api/account/set_passcode',{passcode:p}); show(msg, r.error || r.message || 'OK'); });

    document.getElementById('removePasscodeBtn').addEventListener('click', async function(){ const msg=document.getElementById('passcodeMsg'); show(msg,'Removing...'); const r=await postJson('/api/account/remove_passcode'); show(msg, r.error || r.message || 'Removed'); });
  </script>
</body>
</html>
